<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Propriedades</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Caveat&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: cornflowerblue;
      color: white;
      font-size: 18px;
    }

    #coral{ color: coral;}

    #tamanho{
        font-size: 2rem;
        font-weight: 30px;
    }

    #peso{font-weight: 900;}


    #família{font-family: "Caveat", cursive;}

    #alinhamento{text-align: left;}
    



    
  </style>
</head>

<body>
  <h1>Important CSS Properties</h1>
  <p id="coral">Color</p>
  <p id="tamanho">Font Size</p>
  <p id="peso">Font Weight</p>
  <p id="família">Font Family</p>
  <p id="alinhamento">Text Align</p>


</body>

</html>
