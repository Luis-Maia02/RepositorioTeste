<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>




.flag {
  width: 600px;
  height: 400px;
  background-color: #ce1126; /* Vermelho oficial */
  position: relative;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  align-items: center;
}


.flag > p {
  color: white;
  font-family: serif;
  font-size: 60px;
  margin: 10px 0 0 0;
  z-index: 2;
}


.flag > div {
  background-color: #002868; 
  width: 100%;
  height: 50%; 
  position: absolute;
  top: 25%; 
  display: flex;
  justify-content: center;
  align-items: center;
}


.flag > div > div {
  background-color: white;
  width: 160px;
  height: 160px;
  border-radius: 50%; 
  display: flex;
  justify-content: center;
  align-items: center;
}


.flag > div > div > p {
  color: black;
  font-family: serif;
  font-size: 45px;
  text-align: center;
  margin: 0;
  line-height: 1;
}
    
  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
